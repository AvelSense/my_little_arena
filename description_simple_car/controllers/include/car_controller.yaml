car_controller:

  steering_left:
    {
      type: string,
      default_value: "steering_left_joint",
      description: "Name of the front steering left joint (must provide 'position' state and 'position' command interfaces).",
      read_only: true,
    }

  steering_right:
    {
      type: string,
      default_value: "steering_right_joint",
      description: "Name of the front steering right joint (must provide 'position' state and 'position' command interfaces).",
      read_only: true,
    }

  propulsion_left:
    {
      type: string,
      default_value: "propulsion_left_joint",
      description: "Name of the rear propulsion left joint (must provide 'position' state and 'effort' command interfaces).",
      read_only: true,
    }

  propulsion_right:
    {
      type: string,
      default_value: "propulsion_right_joint",
      description: "Name of the rear propulsion right joint (must provide 'position' state and 'effort' command interfaces).",
      read_only: true,
    }

  steering_wheels_separation: {
    type: double,
    default_value: 0.0,
    description: "Shortest distance between the left and right wheels. If this parameter is wrong, the steering wheels will not be positioned correctly in turns.",
    validation: {
      gt<>: [0.0]
    }
  }
  
  propulsion_wheels_radius: {
    type: double,
    default_value: 0.0,
    description: "Radius of a wheel, i.e., wheels size, used for transformation of linear velocity into wheel rotations. If this parameter is wrong the robot will move faster or slower than expected.",
    validation: {
      gt<>: [0.0]
    }
  }

  cmd_vel_timeout: {
    type: double,
    default_value: 0.5, # seconds
    description: "Timeout in seconds, after which input command on ``cmd_vel`` topic is considered staled.",
  }