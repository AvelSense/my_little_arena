car_controller:

  steering_left:
    {
      type: string,
      default_value: "steering_left_joint",
      description: "Name of the front steering left joint (must provide 'position' state and 'position' command interfaces).",
      read_only: true,
    }

  steering_right:
    {
      type: string,
      default_value: "steering_right_joint",
      description: "Name of the front steering right joint (must provide 'position' state and 'position' command interfaces).",
      read_only: true,
    }

  propulsion_left:
    {
      type: string,
      default_value: "propulsion_left_joint",
      description: "Name of the rear propulsion left joint (must provide 'position' state and 'effort' command interfaces).",
      read_only: true,
    }

  propulsion_right:
    {
      type: string,
      default_value: "propulsion_right_joint",
      description: "Name of the rear propulsion right joint (must provide 'position' state and 'effort' command interfaces).",
      read_only: true,
    }

  wheelbase_length:
    {
      type: double,
      default_value: 0.0,
      description: "Distance between front and rear wheels. For details see: https://en.wikipedia.org/wiki/Wheelbase",
      read_only: false,
      validation: {
        gt<>: [0.0]
      }
    }

  rear_track_width:
    {
      type: double,
      default_value: 0.0,
      description: "Rear wheel track length. For details see: https://en.wikipedia.org/wiki/Wheelbase",
      read_only: false,
    }

  steering_track_width:
    {
      type: double,
      default_value: 0.0,
      description: "Rear wheel track length. For details see: https://en.wikipedia.org/wiki/Wheelbase",
      read_only: false,
    }

  rear_wheels_radius: {
    type: double,
    default_value: 0.0,
    description: "Radius of a wheel, used for transformation of linear velocity into wheel rotations. If this parameter is wrong the robot will move faster or slower than expected.",
    validation: {
      gt<>: [0.0]
    }
  }

  cmd_timeout: {
    type: double,
    default_value: 0.5, # seconds
    description: "Timeout in seconds, after which input command on ``cmd_vel`` topic is considered staled.",
  }